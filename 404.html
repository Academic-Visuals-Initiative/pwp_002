<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<script>
(function(){
    var t = 'light';
    try { t = localStorage.getItem('theme') || 'light'; } catch(e) {}
    document.documentElement.setAttribute('data-theme', t);
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<style>
:root{--font-sans:'Inter',sans-serif;--bg-site:#FFFAF5;--text-main:#1C1C1C;--text-muted:#5C5C5C;--accent:#1A5BB8}
[data-theme="dark"]{--bg-site:#141414;--text-main:#EAEAEA;--text-muted:#AAAAAA;--accent:#6BA3E8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-site);color:var(--text-main);font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
h1{font-size:7rem;font-weight:800;line-height:1;margin-bottom:0.5rem;letter-spacing:-0.03em}
h1 span{color:var(--accent)}
p{color:var(--text-muted);margin-bottom:2.5rem;font-size:1.1rem;max-width:400px}
a{color:var(--accent);text-decoration:none;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;border:0.5px solid var(--accent);padding:8px 20px;transition:all 0.2s ease;display:inline-block}
a:hover{background-color:var(--accent);color:#ffffff}
</style>
</head>
<body>
    <h1>4<span>0</span>4</h1>
    <p>This page is brewing elsewhere. It may have moved or never existed.</p>
    <a href="index.html">&larr; Back to Home</a>
    <script>try { var t = localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); } catch(e){}</script>
</body>
</html>
